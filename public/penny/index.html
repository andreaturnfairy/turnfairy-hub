<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Turnfairy — Penny's Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple-dark: #2B2147;
    --purple: #603D91;
    --purple-mid: #472A66;
    --teal: #5DDFC8;
    --teal-dark: #3BBFAA;
    --border: #E2D9F3;
    --surface: #fff;
    --surface2: #F8F6FF;
    --bg: #F4F1FA;
    --text: #2B2147;
    --text-lt: #5A4E72;
    --text-xlt: #9B8FB5;
    --urgent: #dc2626;
    --high: #B45309;
    --normal: #16a34a;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
    padding: 0 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(43,33,71,.2);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 800; color: #fff; }
  .header-sub { font-size: 0.6rem; color: var(--teal); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
  .header-user { font-size: 0.78rem; color: rgba(255,255,255,.6); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); display: inline-block; margin-right: 4px; }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex; border-top: 1px solid rgba(255,255,255,.1);
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1; min-width: 70px; padding: 9px 8px 8px; text-align: center;
    cursor: pointer; border: none; border-bottom: 3px solid transparent;
    background: none; transition: all .2s; font-family: inherit;
  }
  .tab-btn .t-ico { font-size: 16px; margin-bottom: 2px; display: block; }
  .tab-btn .t-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing: .3px; }
  .tab-btn.active { border-bottom-color: var(--teal); }
  .tab-btn.active .t-lbl { color: var(--teal); }

  /* ── CONTENT ── */
  .page { display: none; padding: 16px 16px 80px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(43,33,71,.06);
    transition: opacity .3s;
  }
  .card.done { opacity: 0.4; }
  .card-face {
    display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px;
    cursor: pointer;
  }

  /* ── CHECKBOX ── */
  .check-wrap { flex-shrink: 0; margin-top: 2px; }
  .check-box {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .check-box.checked { background: var(--teal); border-color: var(--teal); }
  .check-box.checked::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }

  /* ── PRIORITY DOT ── */
  .p-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .p-dot.urgent { background: var(--urgent); }
  .p-dot.high { background: var(--high); }
  .p-dot.normal { background: var(--normal); }

  /* ── TASK TEXT ── */
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: .88rem; font-weight: 600; color: var(--text);
    line-height: 1.4; word-break: break-word;
  }
  .card.done .task-title { text-decoration: line-through; color: var(--text-xlt); }
  .task-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-size: .65rem; font-weight: 700; padding: 1px 7px; border-radius: 4px;
    border: 1px solid; flex-shrink: 0;
  }
  .badge-urgent { color: var(--urgent); background: #FEF2F2; border-color: rgba(220,38,38,.2); }
  .badge-high { color: var(--high); background: #FFFBEB; border-color: rgba(180,83,9,.2); }
  .badge-normal { color: var(--normal); background: #F0FDF4; border-color: rgba(22,163,74,.2); }
  .badge-section { color: var(--purple); background: rgba(96,61,145,.08); border-color: rgba(96,61,145,.2); }
  .badge-due { color: var(--text-xlt); background: var(--surface2); border-color: var(--border); }

  /* ── EXPANDED CARD ── */
  .card-detail { padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .notes-box {
    background: var(--surface2); border-radius: 8px; padding: 10px 12px;
    font-size: .82rem; color: var(--text-lt); line-height: 1.5; margin: 10px 0;
  }
  .detail-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-xlt); margin: 10px 0 4px; }
  .update-field {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: .84rem; font-family: inherit; color: var(--text);
    background: var(--surface2); resize: vertical; min-height: 60px;
  }
  .update-field:focus { outline: none; border-color: var(--purple); }
  .btn { padding: 10px 16px; border-radius: 9px; font-family: inherit; font-size: .84rem; font-weight: 700; cursor: pointer; border: none; transition: all .2s; }
  .btn-primary { background: var(--purple); color: #fff; }
  .btn-primary:hover { background: var(--purple-mid); }
  .btn-ghost { background: var(--surface2); color: var(--text-lt); border: 1.5px solid var(--border); }
  .btn-done { background: var(--teal); color: #fff; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  /* ── SECTION HEADER ── */
  .section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 2px 8px; margin-top: 8px;
  }
  .section-hdr-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-xlt); }
  .section-hdr-count { font-size: .68rem; color: var(--text-xlt); background: var(--surface); padding: 1px 8px; border-radius: 10px; border: 1px solid var(--border); }

  /* ── PROPERTY CARD ── */
  .prop-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .prop-name { font-size: .92rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .prop-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .prop-row:last-child { border-bottom: none; }
  .prop-key { font-size: .75rem; color: var(--text-xlt); }
  .prop-val { font-size: .82rem; font-weight: 600; color: var(--text); }
  .copy-btn { font-size: .68rem; color: var(--teal); cursor: pointer; padding: 2px 6px; border: 1px solid var(--teal); border-radius: 4px; background: none; }

  /* ── SOP CARD ── */
  .sop-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .sop-num { font-size: .65rem; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; }
  .sop-title { font-size: .88rem; font-weight: 700; color: var(--text); margin: 3px 0 6px; }
  .sop-body { font-size: .78rem; color: var(--text-lt); line-height: 1.5; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 48px 20px; }
  .empty-ico { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: .82rem; color: var(--text-xlt); }

  /* ── LOADING ── */
  .loading { text-align: center; padding: 40px; color: var(--text-xlt); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--purple-dark); color: #fff; padding: 10px 20px;
    border-radius: 24px; font-size: .84rem; font-weight: 600;
    z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 400px) {
    .tab-btn .t-lbl { font-size: 9px; }
    .tab-btn { min-width: 60px; }
  }
</style>
</head>
<body>

<!-- PIN GATE -->
<div id="pin-screen" style="position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,var(--purple-dark),var(--purple-mid));display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(43,33,71,.4);">
    <div style="font-family:'Playfair Display',serif;font-weight:800;font-size:1.4rem;color:var(--purple-dark);margin-bottom:4px;">Turnfairy</div>
    <div style="font-size:.85rem;color:var(--text-lt);margin-bottom:24px;">Enter your access code</div>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••"
      style="width:100%;font-size:1.6rem;text-align:center;letter-spacing:8px;padding:14px;border:2px solid var(--border);border-radius:12px;outline:none;margin-bottom:14px;font-family:'DM Sans',sans-serif;"
      onkeydown="if(event.key==='Enter')checkPin()">
    <button onclick="checkPin()" style="width:100%;padding:13px;border:none;border-radius:12px;background:var(--teal-dark);color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;font-family:'DM Sans',sans-serif;">Unlock</button>
    <div id="pin-error" style="color:var(--urgent);font-size:.8rem;margin-top:12px;display:none;">Incorrect code. Try again.</div>
  </div>
</div>

<div id="app-content" style="display:none;">
<div class="header">
  <div class="header-top">
    <div class="header-brand">
      <div>
        <div class="header-logo">Turnfairy</div>
        <div class="header-sub">Penny's Hub</div>
      </div>
    </div>
    <div class="header-user" id="syncStatus">
      <span class="sync-dot"></span>Loading…
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('today')" id="tab-today">
      <div class="t-ico">☀️</div><div class="t-lbl">Today</div>
    </button>
    <button class="tab-btn" onclick="switchTab('all')" id="tab-all">
      <div class="t-ico">✓</div><div class="t-lbl">All Tasks</div>
    </button>
    <button class="tab-btn" onclick="switchTab('properties')" id="tab-properties">
      <div class="t-ico">🏠</div><div class="t-lbl">Properties</div>
    </button>
    <button class="tab-btn" onclick="switchTab('sops')" id="tab-sops">
      <div class="t-ico">📋</div><div class="t-lbl">SOPs</div>
    </button>
  </div>
</div>

<!-- TODAY TAB -->
<div class="page active" id="page-today">
  <div id="today-content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ALL TASKS TAB -->
<div class="page" id="page-all">
  <div id="all-content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- PROPERTIES TAB -->
<div class="page" id="page-properties">
  <div id="properties-content"></div>
</div>

<!-- SOPs TAB -->
<div class="page" id="page-sops">
  <div id="sops-content"></div>
</div>

<div class="toast" id="toast"></div>

</div><!-- /app-content -->

<script>
const PENNY_PIN = '5163';

function checkPin() {
  const input = document.getElementById('pin-input');
  const val = input.value.trim();
  if (val === PENNY_PIN) {
    sessionStorage.setItem('tf_penny_authed', '1');
    unlockApp();
  } else {
    document.getElementById('pin-error').style.display = 'block';
    input.value = '';
    input.focus();
  }
}

function unlockApp() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
  init();
}

// Check for existing session on load
if (sessionStorage.getItem('tf_penny_authed') === '1') {
  unlockApp();
} else {
  document.getElementById('pin-input').focus();
}

const API = '/.netlify/functions/notion-get';
const SAVE_API = '/.netlify/functions/notion-save';

// ── State ─────────────────────────────────────────────────────
let tasks = [];
let expanded = null;
let drafts = {};

// ── Priority config ───────────────────────────────────────────
const PRIORITY = {
  'Urgent': { cls: 'urgent', badge: 'badge-urgent', dot: 'urgent', label: '🚨 Urgent' },
  'High':   { cls: 'high',   badge: 'badge-high',   dot: 'high',   label: '🟠 High' },
  'Normal': { cls: 'normal', badge: 'badge-normal',  dot: 'normal', label: '🟢 Normal' },
};

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await loadTasks();
  renderToday();
  renderAll();
  renderProperties();
  renderSOPs();
}

async function loadTasks() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    // Filter to Penny's items only
    tasks = (data.actions || []).filter(a =>
      (a.owner || '').toLowerCase().includes('penny') ||
      (a.owner || '').toLowerCase().includes('pennylaine')
    );
    document.getElementById('syncStatus').innerHTML = '<span class="sync-dot"></span>Synced';
  } catch(e) {
    document.getElementById('syncStatus').textContent = '⚠ Offline';
    tasks = [];
  }
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
}

// ── TODAY TAB ─────────────────────────────────────────────────
function renderToday() {
  const urgent = tasks.filter(t => t.priority === 'Urgent' && t.status !== 'Done');
  const high = tasks.filter(t => t.priority === 'High' && t.status !== 'Done');
  const normal = tasks.filter(t => (!t.priority || t.priority === 'Normal') && t.status !== 'Done');
  const done = tasks.filter(t => t.status === 'Done');

  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  let html = `<div style="padding: 4px 0 12px">
    <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--text)">${today}</div>
    <div style="font-size:.78rem;color:var(--text-xlt);margin-top:2px">${tasks.filter(t=>t.status!=='Done').length} open tasks</div>
  </div>`;

  if (!tasks.length) {
    html += `<div class="empty"><div class="empty-ico">✅</div><div class="empty-title">All caught up!</div><div class="empty-sub">No tasks assigned to you right now.</div></div>`;
  } else {
    if (urgent.length) {
      html += sectionHeader('🚨 Urgent', urgent.length);
      urgent.forEach(t => { html += buildTaskCard(t); });
    }
    if (high.length) {
      html += sectionHeader('🟠 High Priority', high.length);
      high.forEach(t => { html += buildTaskCard(t); });
    }
    if (normal.length) {
      html += sectionHeader('🟢 Normal', normal.length);
      normal.forEach(t => { html += buildTaskCard(t); });
    }
    if (done.length) {
      html += sectionHeader('✅ Completed', done.length);
      done.forEach(t => { html += buildTaskCard(t); });
    }
  }

  document.getElementById('today-content').innerHTML = html;
}

// ── ALL TASKS TAB ─────────────────────────────────────────────
function renderAll() {
  const open = tasks.filter(t => t.status !== 'Done');
  const done = tasks.filter(t => t.status === 'Done');

  let html = `<div style="padding: 4px 0 12px">
    <div style="font-size:.78rem;color:var(--text-xlt)">${open.length} open · ${done.length} done</div>
  </div>`;

  // Group by section
  const sections = {};
  open.forEach(t => {
    const sec = t.section || 'Other';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(t);
  });

  const sectionOrder = ['Operations', 'Owners', 'Team', 'Finance', 'Sales', 'Other'];
  sectionOrder.forEach(sec => {
    if (sections[sec]?.length) {
      html += sectionHeader(sec, sections[sec].length);
      sections[sec].forEach(t => { html += buildTaskCard(t); });
    }
  });

  if (done.length) {
    html += sectionHeader('✅ Done', done.length);
    done.forEach(t => { html += buildTaskCard(t); });
  }

  if (!tasks.length) {
    html += `<div class="empty"><div class="empty-ico">✅</div><div class="empty-title">All caught up!</div><div class="empty-sub">No tasks assigned to you right now.</div></div>`;
  }

  document.getElementById('all-content').innerHTML = html;
}

// ── TASK CARD ─────────────────────────────────────────────────
function buildTaskCard(t) {
  const p = PRIORITY[t.priority] || PRIORITY['Normal'];
  const isDone = t.status === 'Done';
  const isExpanded = expanded === t.notionId;
  const draft = drafts[t.notionId] || '';

  const sourceBadge = t.section ? `<span class="badge badge-section">${t.section}</span>` : '';
  const dueBadge = t.due ? `<span class="badge badge-due">📅 ${new Date(t.due+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : '';

  let detail = '';
  if (isExpanded) {
    detail = `<div class="card-detail">
      ${t.notes ? `<div class="notes-box">${t.notes}</div>` : ''}
      <div class="detail-label">Add update or note</div>
      <textarea class="update-field" placeholder="What's the status? Any blockers?" 
        oninput="drafts['${t.notionId}']=this.value">${draft}</textarea>
      <div class="btn-row">
        ${!isDone ? `<button class="btn btn-done" style="flex:1" onclick="markDone('${t.notionId}')">✓ Mark Done</button>` : ''}
        <button class="btn btn-primary" style="flex:1" onclick="saveUpdate('${t.notionId}')">💾 Save Note</button>
        <button class="btn btn-ghost" onclick="toggleExpand('${t.notionId}')">✕</button>
      </div>
    </div>`;
  }

  return `<div class="card ${isDone?'done':''}" id="card-${t.notionId}">
    <div class="card-face" onclick="toggleExpand('${t.notionId}')">
      <div class="check-wrap" onclick="event.stopPropagation();toggleDone('${t.notionId}')">
        <div class="check-box ${isDone?'checked':''}"></div>
      </div>
      <div class="task-body">
        <div class="task-title">${t.task}</div>
        <div class="task-meta">
          <span class="badge ${p.badge}">${p.label}</span>
          ${sourceBadge}
          ${dueBadge}
        </div>
      </div>
      <span style="color:var(--text-xlt);font-size:.8rem;flex-shrink:0;transition:transform .2s;transform:${isExpanded?'rotate(180deg)':'rotate(0)'}"">▾</span>
    </div>
    ${detail}
  </div>`;
}

function sectionHeader(title, count) {
  return `<div class="section-hdr">
    <div class="section-hdr-title">${title}</div>
    <div class="section-hdr-count">${count}</div>
  </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────
function toggleExpand(id) {
  expanded = expanded === id ? null : id;
  renderToday();
  renderAll();
}

async function toggleDone(id) {
  const task = tasks.find(t => t.notionId === id);
  if (!task) return;
  const newStatus = task.status === 'Done' ? 'In Progress' : 'Done';
  task.status = newStatus;
  renderToday();
  renderAll();
  try {
    await fetch(SAVE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'actions', id, data: { status: newStatus } })
    });
    showToast(newStatus === 'Done' ? '✅ Marked done!' : '↩ Marked open');
  } catch(e) {
    showToast('⚠ Could not save — try again');
    task.status = task.status === 'Done' ? 'In Progress' : 'Done'; // revert
    renderToday(); renderAll();
  }
}

async function markDone(id) {
  const task = tasks.find(t => t.notionId === id);
  if (!task) return;
  const note = drafts[id];
  task.status = 'Done';
  if (note) task.notes = (task.notes ? task.notes + '\n\n' : '') + 'Update: ' + note;
  expanded = null;
  renderToday(); renderAll();
  try {
    const body = { status: 'Done' };
    if (note) body.notes = task.notes;
    await fetch(SAVE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'actions', id, data: body })
    });
    delete drafts[id];
    showToast('✅ Task complete!');
  } catch(e) {
    showToast('⚠ Could not save');
  }
}

async function saveUpdate(id) {
  const note = drafts[id];
  if (!note?.trim()) { showToast('Nothing to save'); return; }
  const task = tasks.find(t => t.notionId === id);
  if (!task) return;
  task.notes = (task.notes ? task.notes + '\n\nUpdate: ' : 'Update: ') + note;
  try {
    await fetch(SAVE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'actions', id, data: { notes: task.notes } })
    });
    delete drafts[id];
    expanded = null;
    renderToday(); renderAll();
    showToast('💾 Note saved');
  } catch(e) {
    showToast('⚠ Could not save');
  }
}

// ── PROPERTIES TAB ────────────────────────────────────────────
function renderProperties() {
  const props = [

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
