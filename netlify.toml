[build]
  functions = "netlify/functions"
  publish = "public"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PATCH, OPTIONS"

# Auto-process call every Sunday at 11:00 AM PT (19:00 UTC)
# Fathom transcript is usually ready 30-60 min after the call ends
[functions."auto-process-call"]
  schedule = "0 19 * * 0"

# Saturday pre-call briefing email — every Saturday at 9:00 AM PT (17:00 UTC)
[functions."saturday-briefing"]
  schedule = "0 17 * * 6"

# Penny weekly task email — every Monday at 8:00 AM PT (16:00 UTC)
# NOTE: Will not send until PENNY_EMAIL and RESEND_API_KEY are set in Netlify env vars
[functions."penny-monday-email"]
  schedule = "0 16 * * 1"

# Penny monthly call processing — MANUALLY TRIGGERED, no schedule.
# Penny's call cadence is monthly and the date moves around, so this is
# triggered by hand (or by Claude) shortly after each Penny call ends,
# the same way the manager weekly call transcript is processed.
# Trigger: POST or GET to /.netlify/functions/penny-call-process
# Finds the most recent Fathom call with "Penny"/"Pennylaine" in the title
# from the last 48 hours, pushes action items + decisions to Notion, and
# sends a summary email to Penny + the management team.

